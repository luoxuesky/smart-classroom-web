<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧教室物联控制台</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--dark); padding: 20px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; color: var(--dark); margin-bottom: 5px; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 15px; font-size: 14px; background: #e0e0e0; color: #666; transition: 0.3s;}
        .status-badge.online { background: #d5f5e3; color: var(--success); }

        .dashboard { max-width: 1000px; margin: 0 auto; display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        
        /* 数据网格 */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .data-item { background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center; }
        .data-item i { font-size: 24px; margin-bottom: 10px; color: var(--primary); }
        .data-value { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .data-label { font-size: 12px; color: #7f8c8d; }

        /* 打卡记录 */
        .rfid-box { text-align: center; padding: 20px 0; }
        .rfid-icon { font-size: 40px; color: var(--primary); margin-bottom: 10px; }
        .rfid-name { font-size: 22px; font-weight: bold; color: var(--success); }
        .rfid-time { font-size: 14px; color: #95a5a6; margin-top: 5px; }

        /* 打卡历史列表新增样式 */
        .history-list { max-height: 200px; overflow-y: auto; padding-right: 5px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
        .history-item:last-child { border-bottom: none; }
        .history-item .h-name { font-weight: bold; color: var(--dark); }
        .history-item .h-time { color: #7f8c8d; font-size: 12px; }
        
        /* 滚动条美化 */
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        .history-list::-webkit-scrollbar-thumb:hover { background: #999; }

        /* 控制按钮 */
        .control-group { margin-bottom: 20px; }
        .control-label { font-weight: bold; margin-bottom: 10px; display: block; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; background: #ecf0f1; color: var(--dark); }
        .btn:hover { background: #bdc3c7; }
        .btn.active-on { background: var(--success); color: white; }
        .btn.active-off { background: var(--danger); color: white; }
        .btn.active-auto { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎓 智慧教室物联控制台</h1>
        <div id="conn-status" class="status-badge"><i class="fas fa-circle-notch fa-spin"></i> 正在连接云端...</div>
    </div>

    <div class="dashboard">
        <div class="card">
            <div class="card-title">
                <span><i class="fas fa-leaf"></i> 实时环境数据</span>
            </div>
            <div class="data-grid">
                <div class="data-item">
                    <i class="fas fa-thermometer-half" style="color: #e74c3c;"></i>
                    <div class="data-value" id="val-temp">-- ℃</div>
                    <div class="data-label">室内温度</div>
                </div>
                <div class="data-item">
                    <i class="fas fa-tint" style="color: #3498db;"></i>
                    <div class="data-value" id="val-hum">-- %</div>
                    <div class="data-label">空气湿度</div>
                </div>
                <div class="data-item">
                    <i class="fas fa-sun" style="color: #f1c40f;"></i>
                    <div class="data-value" id="val-light">-- %</div>
                    <div class="data-label">光照强度</div>
                </div>
                <div class="data-item">
                    <i class="fas fa-wind" style="color: #2ecc71;"></i>
                    <div class="data-value" id="val-co2">-- ppm</div>
                    <div class="data-label">CO2 浓度</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <span><i class="fas fa-gamepad"></i> 远程强控中心</span>
            </div>
            
            <div class="control-group">
                <span class="control-label"><i class="fas fa-fan"></i> 换气风扇 (继电器)</span>
                <div class="btn-group">
                    <button class="btn" onclick="sendCmd('classrelay002', 'on')">开启 (ON)</button>
                    <button class="btn" onclick="sendCmd('classrelay002', 'off')">关闭 (OFF)</button>
                    <button class="btn active-auto" onclick="sendCmd('classrelay002', 'auto')">恢复自动</button>
                </div>
            </div>

            <div class="control-group">
                <span class="control-label"><i class="fas fa-person-booth"></i> 遮阳窗帘 (舵机)</span>
                <div class="btn-group">
                    <button class="btn" onclick="sendCmd('classcurtain009', 'on')">拉开 (ON)</button>
                    <button class="btn" onclick="sendCmd('classcurtain009', 'off')">关闭 (OFF)</button>
                    <button class="btn active-auto" onclick="sendCmd('classcurtain009', 'auto')">恢复自动</button>
                </div>
            </div>
            <p style="font-size: 12px; color: #7f8c8d; margin-top: 15px;">* 点击控制按钮将下发指令并覆盖本地自动化逻辑，点击“恢复自动”交还单片机控制权。</p>
        </div>

        <div class="card">
            <div class="card-title">
                <span><i class="fas fa-id-card"></i> 最新考勤记录</span>
            </div>
            <div class="rfid-box">
                <i class="fas fa-check-circle rfid-icon"></i>
                <div class="rfid-name" id="val-rfid">等待刷卡...</div>
                <div class="rfid-time" id="val-rfid-time">--:--:--</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <span><i class="fas fa-list-alt"></i> 打卡历史记录</span>
                <span style="font-size: 12px; font-weight: normal; color: #7f8c8d;">本地实时抓取</span>
            </div>
            <div class="history-list" id="history-list">
                <div style="text-align: center; color: #bdc3c7; padding: 20px 0; font-size: 14px;" id="empty-hint">
                    暂无打卡记录...
                </div>
            </div>
        </div>
    </div>

<script>
    // === 巴法云配置 ===
    const UID = "8a4623632890437b916c4e67770cfd29"; 
    const TOPIC_DATA = "classdata";
    const TOPIC_RFID = "classRFID";

    // 新增：记录上一次打卡的数据，避免重复添加历史记录
    let lastRfidData = null; 

    function setOnlineStatus(isOnline) {
        const statusDiv = document.getElementById('conn-status');
        if (isOnline) {
            statusDiv.innerHTML = '<i class="fas fa-wifi"></i> HTTP 云端在线';
            statusDiv.classList.add('online');
        } else {
            statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 网络被拦截';
            statusDiv.classList.remove('online');
        }
    }

    // 新增：添加历史记录的函数
    function addHistoryRecord(name, timeStr) {
        const historyList = document.getElementById('history-list');
        const emptyHint = document.getElementById('empty-hint');
        
        // 如果有“暂无记录”的提示，移除它
        if (emptyHint) {
            emptyHint.remove();
        }

        // 创建新的记录条目
        const newItem = document.createElement('div');
        newItem.className = 'history-item';
        newItem.innerHTML = `
            <span class="h-name"><i class="fas fa-user-check" style="color: var(--success); margin-right: 5px;"></i>${name}</span>
            <span class="h-time"><i class="far fa-clock" style="margin-right: 3px;"></i>${timeStr}</span>
        `;
        
        // 将新记录插入到列表的最前面
        historyList.insertBefore(newItem, historyList.firstChild);
    }

    // ==================== 完整修复版 fetchCloudData ====================
    async function fetchCloudData() {
        try {
            // === 1. 实时环境数据 ===
            let resData = await fetch(`https://api.bemfa.com/api/device/v1/data/3/get/?uid=${UID}&topic=${TOPIC_DATA}&num=1`, { cache: 'no-store' });
            let jsonData = await resData.json();
            
            if (jsonData.data) {
                let rawMsg = jsonData.data;
                try {
                    let payload = JSON.parse(rawMsg);
                    document.getElementById('val-temp').innerText = payload.temp.toFixed(1) + " ℃";
                    document.getElementById('val-hum').innerText = payload.hum.toFixed(1) + " %";
                    document.getElementById('val-light').innerText = payload.light + " %";
                    document.getElementById('val-co2').innerText = payload.co2 + " ppm";
                    document.getElementById('val-co2').style.color = payload.co2 > 1000 ? "var(--danger)" : "var(--dark)";
                } catch (parseError) {
                    console.warn("环境数据解析失败:", rawMsg);
                }
            }

            // === 2. 最新考勤记录及历史记录逻辑 ===
            let resRfid = await fetch(`https://api.bemfa.com/api/device/v1/data/3/get/?uid=${UID}&topic=${TOPIC_RFID}&num=1`, { cache: 'no-store' });
            let jsonRfid = await resRfid.json();
            
            if (jsonRfid.data) {
                let currentRfid = jsonRfid.data;
                
                // 判断是否是新的打卡记录（防重复判断）
                if (currentRfid !== lastRfidData) {
                    // 获取当前抓取到数据的时间
                    let now = new Date();
                    let timeStr = now.toLocaleTimeString(); // 例如: "15:30:50"
                    // 如果你需要包含日期，可以使用 now.toLocaleString()

                    // 1. 更新卡片显示的最新状态
                    document.getElementById('val-rfid').innerText = currentRfid;
                    document.getElementById('val-rfid-time').innerText = "打卡时间: " + timeStr;

                    // 2. 添加到历史记录列表
                    // 注意：首次加载网页时，会把云端残留的最后一次记录当作当前打卡记录写入历史
                    addHistoryRecord(currentRfid, timeStr);

                    // 3. 更新对比变量
                    lastRfidData = currentRfid;
                }
            } else {
                document.getElementById('val-rfid').innerText = "等待刷卡...";
                document.getElementById('val-rfid-time').innerText = "打卡时间: --:--:--";
            }

            setOnlineStatus(true);
        } catch (error) {
            console.error("网络请求失败，可能是电脑本地拦截:", error);
            setOnlineStatus(false);
        }
    }

    // ==================== 控制指令发送 ====================
    async function sendCmd(topic, command) {
        let url = `https://api.bemfa.com/api/device/v1/data/3/push/get/?uid=${UID}&topic=${topic}&msg=${command}`;
        try {
            let response = await fetch(url, { cache: 'no-store' });
            if(response.ok) {
                let deviceName = topic === "classrelay002" ? "风扇" : "窗帘";
                console.log(`[HTTP 强控] 已向 ${deviceName} 发送指令: ${command}`);
                let btnText = command === "on" ? "已发送开启" : (command === "off" ? "已发送关闭" : "已发送自动");
                alert(`✅ 指令 [${btnText}] 已成功发送至硬件！\n设备名: ${deviceName}`);
            } else {
                alert("❌ 控制指令发送失败，服务器响应异常！");
            }
        } catch (error) {
            alert("❌ 控制指令发送失败，请检查网络！");
            console.error(error);
        }
    }

    // ==================== 页面加载 & 自动刷新 ====================
    window.onload = function() {
        fetchCloudData(); 
        setInterval(fetchCloudData, 3000);   // 每3秒自动刷新一次
    };
</script>
</body>
</html>
